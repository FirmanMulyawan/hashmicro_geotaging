name: hashmicro
version: 1.0.0+118
publish_to: none
description: A new Flutter project.
environment:
  sdk: ">=3.2.6 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.2
  get: 4.6.6
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.0
  dio: ^5.3.3
  flutter_svg: ^2.0.9
  dotted_border: ^2.1.0
  permission_handler: ^11.0.1
  shimmer: ^3.0.0
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  package_info_plus: ^4.2.0
  carousel_slider: ^4.2.1
  google_fonts: ^6.1.0
  intl: ^0.19.0
  d_chart: ^2.6.3
  iconly: ^1.0.1
  flutter_staggered_grid_view: ^0.7.0
  image_picker: ^1.0.4
  calendar_date_picker2: ^0.5.3
  json_annotation: ^4.8.1
  camera: ^0.10.5+5
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  lottie: ^2.7.0
  gap: ^3.0.1
  device_info: ^2.0.3
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  google_maps_flutter: ^2.2.8
  flutter_polyline_points: ^2.0.0
  syncfusion_flutter_signaturepad: ^24.2.6
  mlkit_scanner: ^0.5.3
  device_imei: ^0.0.4+2
  unique_identifier: ^0.3.0
  device_info_plus: ^10.1.2
  device_information: ^0.0.4
  redacted: ^1.0.11
  card_loading: ^0.3.2
  infinite_scroll_pagination: ^4.0.0
  dotted_separator: ^1.0.6
  scribble: ^0.10.0+1
  pdf: ^3.11.1
  share_plus: 10.0.0
  lindi_sticker_widget: ^0.1.3
  image: ^4.2.0
  objectbox: ^4.0.2
  signature: ^5.5.0
  easy_signature_pad: ^1.0.7
  pretty_print_json: ^1.0.1
  flutter_hooks: ^0.20.0
  grouped_list: ^6.0.0
  print_bluetooth_thermal: ^1.1.7
  esc_pos_utils_plus: ^2.0.4
  audio_plus: ^1.0.3
  equatable: ^2.0.7
  skeletonizer: ^1.4.3
  system_clock: ^3.0.0
  path_provider: ^2.1.5
  photo_view: ^0.14.0
  image_gallery_saver: ^2.0.3
  audioplayers: ^5.2.1
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_lints: ^2.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.11
  flutter_test:
    sdk: flutter
  objectbox_generator: ^4.0.2
  objectbox_flutter_libs: ^4.0.2

flutter:
  assets:
    - assets/svg/
    - assets/images/
    - assets/env/
    - assets/fonts/
    - assets/sounds/

  fonts:
    - family: BloggerSans
      fonts:
        - asset: assets/fonts/Blogger_Sans/Blogger_Sans.ttf
        - asset: assets/fonts/Blogger_Sans/Blogger_Sans-Italic.ttf
          style: italic
        - asset: assets/fonts/Blogger_Sans/Blogger_Sans-Light.ttf
          weight: 400
        - asset: assets/fonts/Blogger_Sans/Blogger_Sans-Light_Italic.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/Blogger_Sans/Blogger_Sans-Medium.ttf
          weight: 600
        - asset: assets/fonts/Blogger_Sans/Blogger_Sans-Medium_Italic.ttf
          style: italic
          weight: 600
        - asset: assets/fonts/Blogger_Sans/Blogger_Sans-Bold.ttf
          weight: 700
        - asset: assets/fonts/Blogger_Sans/Blogger_Sans-Bold_Italic.ttf
          style: italic
          weight: 700

  uses-material-design: true
